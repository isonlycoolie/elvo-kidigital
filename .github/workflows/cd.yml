name: CD

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Verify before release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run full test suite
        run: bash infrastructure/scripts/ci-test.sh

  build-images:
    name: Build Docker image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - elvo-identity-service
          - elvo-wallet-service
          - elvo-billing-service
          - elvo-account-management-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cd-summary:
    name: CD summary
    runs-on: ubuntu-latest
    needs: [test, build-images]
    if: always()
    steps:
      - name: Check pipeline result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Verify-before-release tests failed."
            exit 1
          fi
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "Docker image build/push failed for one or more services."
            exit 1
          fi
          echo "All service images built and pushed to GHCR."
