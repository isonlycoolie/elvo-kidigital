name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Maven tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service:
          - elvo-identity-service
          - elvo-wallet-service
          - elvo-billing-service
          - elvo-account-management-service
          - elvo-notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit and integration tests
        working-directory: services/${{ matrix.service }}
        run: mvn -B -ntp clean verify -Ddependency.check.skip=true

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/target/surefire-reports/
            services/${{ matrix.service }}/target/failsafe-reports/
          if-no-files-found: ignore

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more service test jobs failed."
            exit 1
          fi
          echo "All service test jobs passed."
