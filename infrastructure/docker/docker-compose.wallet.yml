version: "3.9"

services:
  wallet-postgres:
    image: postgres:16
    container_name: elvo-wallet-postgres
    environment:
      POSTGRES_DB: elvo_wallet
      POSTGRES_USER: elvo
      POSTGRES_PASSWORD: elvo
    ports:
      - "5432:5432"
    volumes:
      - wallet-postgres-data:/var/lib/postgresql/data

  wallet-redis:
    image: redis:7
    container_name: elvo-wallet-redis
    ports:
      - "6379:6379"
    volumes:
      - wallet-redis-data:/data

  wallet-rabbitmq:
    image: rabbitmq:3.13-management
    container_name: elvo-wallet-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - wallet-rabbitmq-data:/var/lib/rabbitmq

  wallet-service:
    build:
      context: ../../services/elvo-wallet-service
      dockerfile: Dockerfile
    container_name: elvo-wallet-service
    depends_on:
      - wallet-postgres
      - wallet-redis
      - wallet-rabbitmq
    env_file:
      - ../../.env.shared
      - ../../services/elvo-wallet-service/.env
    environment:
      ELVO_DB_HOST: wallet-postgres
      ELVO_DB_PORT: 5432
      ELVO_REDIS_HOST: wallet-redis
      ELVO_REDIS_PORT: 6379
      ELVO_RABBITMQ_HOST: wallet-rabbitmq
      ELVO_RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"

volumes:
  wallet-postgres-data:
  wallet-redis-data:
  wallet-rabbitmq-data:
