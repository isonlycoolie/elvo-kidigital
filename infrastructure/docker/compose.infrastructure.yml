services:
  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    hostname: identity-db
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_db}
      POSTGRES_USER: ${IDENTITY_DB_USER:-identity_user}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-identity_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    expose:
      - "5432"
    restart: always
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER:-identity_user} -d ${IDENTITY_DB_NAME:-identity_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

  wallet-db:
    image: postgres:16-alpine
    container_name: wallet-db
    hostname: wallet-db
    environment:
      POSTGRES_DB: ${WALLET_DB_NAME:-wallet_db}
      POSTGRES_USER: ${WALLET_DB_USER:-wallet_user}
      POSTGRES_PASSWORD: ${WALLET_DB_PASSWORD:-wallet_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    expose:
      - "5432"
    restart: always
    volumes:
      - wallet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WALLET_DB_USER:-wallet_user} -d ${WALLET_DB_NAME:-wallet_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

  billing-db:
    image: postgres:16-alpine
    container_name: billing-db
    hostname: billing-db
    environment:
      POSTGRES_DB: ${BILLING_DB_NAME:-billing_db}
      POSTGRES_USER: ${BILLING_DB_USER:-billing_user}
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD:-billing_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    expose:
      - "5432"
    restart: always
    volumes:
      - billing-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER:-billing_user} -d ${BILLING_DB_NAME:-billing_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

  account-db:
    image: postgres:16-alpine
    container_name: account-db
    hostname: account-db
    environment:
      POSTGRES_DB: ${ACCOUNT_DB_NAME:-account_db}
      POSTGRES_USER: ${ACCOUNT_DB_USER:-account_user}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASSWORD:-account_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    expose:
      - "5432"
    restart: always
    volumes:
      - account-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACCOUNT_DB_USER:-account_user} -d ${ACCOUNT_DB_NAME:-account_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    expose:
      - "6379"
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/prometheus/alerts.local.yml:/etc/prometheus/alerts.local.yml:ro
      - prometheus-data:/prometheus
    restart: always
    profiles:
      - monitoring
    depends_on:
      elvo-identity-service:
        condition: service_started
      elvo-wallet-service:
        condition: service_started
      elvo-billing-service:
        condition: service_started
    networks:
      - backend-network
      - frontend-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../../monitoring/alertmanager/alertmanager.local.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: always
    profiles:
      - monitoring
    networks:
      - backend-network
      - frontend-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: always
    profiles:
      - monitoring
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - backend-network
      - frontend-network
