spring:
  application:
    name: elvo-notification-service
  config:
    import: optional:classpath:/shared/config-lib.yml
  datasource:
    url: jdbc:postgresql://${ELVO_DB_HOST:localhost}:${ELVO_DB_PORT:5432}/${ELVO_DB_NAME:notification_db}
    username: ${ELVO_DB_USER:notification_user}
    password: ${ELVO_DB_PASSWORD:notification_password}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${ELVO_REDIS_HOST:localhost}
      port: ${ELVO_REDIS_PORT:6379}
  rabbitmq:
    host: ${ELVO_RABBITMQ_HOST:localhost}
    port: ${ELVO_RABBITMQ_PORT:5672}

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  pattern:
    level: "%5p [corr:%X{correlationId}]"
