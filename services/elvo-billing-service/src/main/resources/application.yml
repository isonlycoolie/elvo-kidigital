spring:
  application:
    name: elvo-billing-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  config:
    import: optional:classpath:/shared/config-lib.yml
  datasource:
    url: jdbc:postgresql://${ELVO_DB_HOST:localhost}:${ELVO_DB_PORT:5432}/${ELVO_DB_NAME:elvo-billing-service}
    username: ${ELVO_DB_USER:elvo}
    password: ${ELVO_DB_PASSWORD:elvo}
    hikari:
      maximum-pool-size: ${ELVO_DB_POOL_MAX_SIZE:10}
      minimum-idle: ${ELVO_DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  data:
    redis:
      host: ${ELVO_REDIS_HOST:localhost}
      port: ${ELVO_REDIS_PORT:6379}
  rabbitmq:
    host: ${ELVO_RABBITMQ_HOST:localhost}
    port: ${ELVO_RABBITMQ_PORT:5672}
    username: ${ELVO_RABBITMQ_USERNAME:guest}
    password: ${ELVO_RABBITMQ_PASSWORD:guest}
    virtual-host: ${ELVO_RABBITMQ_VHOST:/}

elvo:
  billing:
    adapters:
      default-provider: ${ELVO_BILLING_DEFAULT_PROVIDER:mock}
      request-timeout-ms: ${ELVO_BILLING_ADAPTER_TIMEOUT_MS:5000}
      max-retries: ${ELVO_BILLING_ADAPTER_MAX_RETRIES:2}
      retry-backoff-ms: ${ELVO_BILLING_ADAPTER_RETRY_BACKOFF_MS:300}
      providers:
        selcom:
          base-url: ${ELVO_BILLING_SELCOM_BASE_URL:https://api.sandbox.selcom.example}
          api-key: ${ELVO_BILLING_SELCOM_API_KEY:}
          secret: ${ELVO_BILLING_SELCOM_SECRET:}
        mock:
          enabled: ${ELVO_BILLING_MOCK_ADAPTER_ENABLED:true}
    sentry:
      alerts:
        enabled: ${ELVO_BILLING_SENTRY_ALERTS_ENABLED:true}
        critical-error-threshold: ${ELVO_BILLING_SENTRY_CRITICAL_THRESHOLD:1}
        adapter-failure-threshold: ${ELVO_BILLING_SENTRY_ADAPTER_FAILURE_THRESHOLD:3}
        anomaly-latency-threshold-ms: ${ELVO_BILLING_SENTRY_ANOMALY_LATENCY_MS:2000}

management:
  prometheus:
    metrics:
      export:
        enabled: ${ELVO_METRICS_PROMETHEUS_ENABLED:true}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${ELVO_TRACING_SAMPLING_PROBABILITY:1.0}

logging:
  level:
    root: ${ELVO_LOG_LEVEL_ROOT:INFO}
    '[com.elvo.billing]': ${ELVO_LOG_LEVEL_BILLING:INFO}
  file:
    name: ${ELVO_LOG_FILE:}
  pattern:
    level: "%5p [corr:%X{correlationId}] [req:%X{requestId}] [idemp:%X{idempotencyKey}]"

sentry:
  enabled: ${ELVO_SENTRY_ENABLED:false}
  dsn: ${ELVO_SENTRY_DSN:}
  environment: ${ELVO_SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:default}}
  release: ${ELVO_SENTRY_RELEASE:elvo-billing-service@local}
  traces-sample-rate: ${ELVO_SENTRY_TRACES_SAMPLE_RATE:0.0}
