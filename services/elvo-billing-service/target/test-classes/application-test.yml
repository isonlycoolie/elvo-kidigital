spring:
  datasource:
    url: jdbc:h2:mem:elvo_billing_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: INFO

elvo:
  security:
    jwt:
      secret: test-billing-jwt-secret-which-is-at-least-32-bytes
  service:
    name: elvo-billing-service-test