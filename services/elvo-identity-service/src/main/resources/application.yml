spring:
  application:
    name: elvo-identity-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:classpath:/shared/config-lib.yml,optional:classpath:/shared/messaging-lib.yml
  datasource:
    url: jdbc:postgresql://${ELVO_DB_HOST:localhost}:${ELVO_DB_PORT:5432}/${ELVO_DB_NAME:elvo_identity}
    username: ${ELVO_DB_USER:elvo}
    password: ${ELVO_DB_PASSWORD:elvo}
    hikari:
      maximum-pool-size: ${ELVO_DB_POOL_MAX:20}
      minimum-idle: ${ELVO_DB_POOL_MIN:5}
      connection-timeout: ${ELVO_DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${ELVO_REDIS_HOST:localhost}
      port: ${ELVO_REDIS_PORT:6379}
      timeout: ${ELVO_REDIS_TIMEOUT_MS:5000}
  rabbitmq:
    host: ${ELVO_RABBITMQ_HOST:localhost}
    port: ${ELVO_RABBITMQ_PORT:5672}
    username: ${ELVO_RABBITMQ_USER:guest}
    password: ${ELVO_RABBITMQ_PASSWORD:guest}
  mail:
    host: ${EMAIL_PROVIDER_HOST:localhost}
    port: ${EMAIL_PROVIDER_PORT:1025}
    username: ${EMAIL_PROVIDER_USERNAME:}
    password: ${EMAIL_PROVIDER_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_PROVIDER_SMTP_AUTH:true}
          starttls:
            enable: ${EMAIL_PROVIDER_SMTP_STARTTLS:true}

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: ${ELVO_LOG_LEVEL_ROOT:INFO}
    com.elvo.identity: ${ELVO_LOG_LEVEL_APP:INFO}
  pattern:
    level: "%5p [corr:%X{correlationId}] [req:%X{requestId}]"

sentry:
  dsn: ${SENTRY_DSN:${ELVO_SENTRY_DSN:}}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}
  release: ${SENTRY_RELEASE:elvo-identity-service@${spring.application.name}-${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: ${SENTRY_SEND_DEFAULT_PII:${ELVO_SENTRY_SEND_DEFAULT_PII:false}}
  max-breadcrumbs: ${SENTRY_MAX_BREADCRUMBS:100}
  attach-stacktrace: true
  in-app-includes:
    - com.elvo.identity
  tags:
    service: ${ELVO_SERVICE_TAG:elvo-identity-service}
    domain: identity
    platform: spring-boot

elvo:
  startup:
    validate-required-env: ${ELVO_VALIDATE_REQUIRED_ENV:true}
    reject-insecure-defaults: ${ELVO_REJECT_INSECURE_DEFAULTS:true}
    relaxed-profiles: ${ELVO_RELAXED_PROFILES:dev,test,local}
  communication:
    email:
      from: ${EMAIL_PROVIDER_FROM:no-reply@elvo.local}
    sms:
      retry-max-attempts: ${ELVO_SMS_RETRY_MAX_ATTEMPTS:3}
    notification:
      enabled: ${ELVO_NOTIFICATION_ENABLED:false}
      base-url: ${ELVO_NOTIFICATION_BASE_URL:http://localhost:8085}
      username: ${ELVO_NOTIFICATION_BASIC_USER:user}
      password: ${ELVO_NOTIFICATION_BASIC_PASSWORD:}
  clients:
    provisioning:
      wallet-base-url: ${ELVO_WALLET_PROVISIONING_BASE_URL:http://localhost:8082}
      profile-base-url: ${ELVO_PROFILE_PROVISIONING_BASE_URL:http://localhost:8086}
      account-lifecycle-base-url: ${ELVO_ACCOUNT_LIFECYCLE_BASE_URL:http://localhost:8084}
      profile-provisioning-enabled: ${ELVO_PROFILE_PROVISIONING_ENABLED:false}
      source-service-name: ${ELVO_PROVISIONING_SOURCE_SERVICE:identity-service}
      internal-auth-token: ${ELVO_PROVISIONING_INTERNAL_AUTH_TOKEN:}
      connect-timeout-ms: ${ELVO_PROVISIONING_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${ELVO_PROVISIONING_READ_TIMEOUT_MS:3000}
      max-attempts: ${ELVO_PROVISIONING_MAX_ATTEMPTS:3}
      retry-backoff-ms: ${ELVO_PROVISIONING_RETRY_BACKOFF_MS:150}
      retry-backoff-multiplier: ${ELVO_PROVISIONING_RETRY_BACKOFF_MULTIPLIER:2.0}
      retry-max-backoff-ms: ${ELVO_PROVISIONING_RETRY_MAX_BACKOFF_MS:1000}
    account:
      base-url: ${ELVO_ACCOUNT_READ_BASE_URL:http://localhost:8084}
      source-service-name: ${ELVO_ACCOUNT_READ_SOURCE_SERVICE:identity-service}
      internal-auth-token: ${ELVO_ACCOUNT_READ_INTERNAL_AUTH_TOKEN:}
      connect-timeout-ms: ${ELVO_ACCOUNT_READ_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${ELVO_ACCOUNT_READ_READ_TIMEOUT_MS:3000}
  monitoring:
    sentry:
      service-tag: ${ELVO_SERVICE_TAG:elvo-identity-service}
      probe:
        enabled: ${ELVO_SENTRY_PROBE_ENABLED:false}
        token: ${ELVO_SENTRY_PROBE_TOKEN:}
  security:
    internal-jwt:
      secret: ${ELVO_INTERNAL_JWT_SECRET:}
      issuer: ${ELVO_INTERNAL_JWT_ISSUER:elvo-wallet-service-internal-dev}
      audience: ${ELVO_INTERNAL_JWT_AUDIENCE:elvo-wallet-service-internal-dev}
      required-role: ${ELVO_INTERNAL_JWT_REQUIRED_ROLE:INTERNAL_SERVICE}
      token-ttl-seconds: ${ELVO_INTERNAL_JWT_TOKEN_TTL_SECONDS:60}
    otp:
      hash-pepper: ${ELVO_OTP_HASH_PEPPER:change-this-otp-pepper}
      ttl-minutes: ${ELVO_OTP_TTL_MINUTES:5}
      max-attempts: ${ELVO_OTP_MAX_ATTEMPTS:5}
      max-resends-per-window: ${ELVO_OTP_MAX_RESENDS_PER_WINDOW:3}
      resend-window-minutes: ${ELVO_OTP_RESEND_WINDOW_MINUTES:15}
      resend-cooldown-seconds: ${ELVO_OTP_RESEND_COOLDOWN_SECONDS:60}
      rate-limit:
        verify-ip-max: ${ELVO_OTP_VERIFY_IP_MAX:10}
        verify-ip-window-minutes: ${ELVO_OTP_VERIFY_IP_WINDOW_MINUTES:15}
        send-ip-max: ${ELVO_OTP_SEND_IP_MAX:20}
        send-ip-window-minutes: ${ELVO_OTP_SEND_IP_WINDOW_MINUTES:60}
        send-device-max: ${ELVO_OTP_SEND_DEVICE_MAX:10}
        send-device-window-minutes: ${ELVO_OTP_SEND_DEVICE_WINDOW_MINUTES:60}
        key-prefix: ${ELVO_OTP_RATE_LIMIT_KEY_PREFIX:elvo:otp:rate:}
    verification-token:
      ttl-minutes: ${ELVO_VERIFICATION_TOKEN_TTL_MINUTES:10}
      token-key-prefix: ${ELVO_VERIFICATION_TOKEN_KEY_PREFIX:elvo:verification:token:}
      user-key-prefix: ${ELVO_VERIFICATION_USER_KEY_PREFIX:elvo:verification:user:}
    pending-registration:
      expiry-hours: ${ELVO_PENDING_REGISTRATION_EXPIRY_HOURS:24}
      cleanup-interval-ms: ${ELVO_PENDING_REGISTRATION_CLEANUP_INTERVAL_MS:3600000}
    totp:
      issuer: ${ELVO_TOTP_ISSUER:ELVO}
      period-seconds: ${ELVO_TOTP_PERIOD_SECONDS:30}
      digits: ${ELVO_TOTP_DIGITS:6}
      allowed-skew-steps: ${ELVO_TOTP_ALLOWED_SKEW_STEPS:1}
      enrollment-ttl-minutes: ${ELVO_TOTP_ENROLLMENT_TTL_MINUTES:10}
      pending-key-prefix: ${ELVO_TOTP_PENDING_KEY_PREFIX:elvo:totp:pending:}
      active-key-prefix: ${ELVO_TOTP_ACTIVE_KEY_PREFIX:elvo:totp:active:}
      encryption-secret-ref: ${ELVO_TOTP_ENCRYPTION_SECRET_REF:sm://identity-totp-encryption-secret}
      recovery:
        code-count: ${ELVO_TOTP_RECOVERY_CODE_COUNT:8}
        code-length: ${ELVO_TOTP_RECOVERY_CODE_LENGTH:10}
        ttl-days: ${ELVO_TOTP_RECOVERY_TTL_DAYS:365}
        key-prefix: ${ELVO_TOTP_RECOVERY_KEY_PREFIX:elvo:totp:recovery:}
    risk:
      challenge-threshold: ${ELVO_RISK_CHALLENGE_THRESHOLD:50}
      block-threshold: ${ELVO_RISK_BLOCK_THRESHOLD:80}
      weights:
        missing-ip: ${ELVO_RISK_WEIGHT_MISSING_IP:25}
        unknown-device: ${ELVO_RISK_WEIGHT_UNKNOWN_DEVICE:25}
        suspicious-activity: ${ELVO_RISK_WEIGHT_SUSPICIOUS_ACTIVITY:10}
        mfa-disabled: ${ELVO_RISK_WEIGHT_MFA_DISABLED:20}
        missing-user-agent: ${ELVO_RISK_WEIGHT_MISSING_USER_AGENT:10}
    fast-login:
      method-policy:
        ttl-days: ${ELVO_FAST_LOGIN_METHOD_POLICY_TTL_DAYS:30}
        key-prefix: ${ELVO_FAST_LOGIN_METHOD_POLICY_KEY_PREFIX:elvo:fast-login:method:}
    jwt:
      secret: ${ELVO_JWT_SECRET_REF:sm://identity-jwt-secret}
      issuer: ${ELVO_JWT_ISSUER:elvo-identity-service-${spring.profiles.active:dev}}
      audience: ${ELVO_JWT_AUDIENCE:elvo-wallet-service-${spring.profiles.active:dev}}
      revocation:
        key-prefix: ${ELVO_JWT_REVOCATION_KEY_PREFIX:elvo:jwt:revoked:}
        namespace: ${ELVO_JWT_REVOCATION_NAMESPACE:elvo:${spring.profiles.active:dev}}
      signing:
        key-id: ${ELVO_JWT_SIGNING_KEY_ID:}
        private-key-pem: ${ELVO_JWT_SIGNING_PRIVATE_KEY_REF:sm://identity-jwt-signing-private-key}
        public-key-pem: ${ELVO_JWT_SIGNING_PUBLIC_KEY_REF:sm://identity-jwt-signing-public-key}
        previous-key-id: ${ELVO_JWT_PREVIOUS_SIGNING_KEY_ID:}
        previous-public-key-pem: ${ELVO_JWT_PREVIOUS_SIGNING_PUBLIC_KEY_REF:sm://identity-jwt-signing-previous-public-key}
      access-token-ttl-minutes: ${ELVO_JWT_ACCESS_TTL_MINUTES:5}
      refresh-token-ttl-days: ${ELVO_JWT_REFRESH_TTL_DAYS:7}
      session-absolute-ttl-days: ${ELVO_JWT_SESSION_ABSOLUTE_TTL_DAYS:30}
  messaging:
    audit:
      event-version: ${ELVO_AUDIT_EVENT_VERSION:v1}
      exchange: ${ELVO_AUDIT_EXCHANGE:elvo.identity.audit.exchange}
      routing-key: ${ELVO_AUDIT_ROUTING_KEY:elvo.identity.audit.event}
      dead-letter-exchange: ${ELVO_AUDIT_DLX:elvo.identity.audit.dlx}
      dead-letter-routing-key: ${ELVO_AUDIT_DLQ_ROUTING_KEY:elvo.identity.audit.dead}
      queue: ${ELVO_AUDIT_QUEUE:elvo.identity.audit.queue}
      dead-letter-queue: ${ELVO_AUDIT_DLQ:elvo.identity.audit.dlq}
      retry-queue: ${ELVO_AUDIT_RETRY_QUEUE:elvo.identity.audit.retry.queue}
      retry-routing-key: ${ELVO_AUDIT_RETRY_ROUTING_KEY:elvo.identity.audit.retry}
      retry-delay-ms: ${ELVO_AUDIT_RETRY_DELAY_MS:5000}
      publish-max-attempts: ${ELVO_AUDIT_PUBLISH_MAX_ATTEMPTS:3}
      publish-initial-interval-ms: ${ELVO_AUDIT_PUBLISH_INITIAL_INTERVAL_MS:200}
      publish-multiplier: ${ELVO_AUDIT_PUBLISH_MULTIPLIER:2.0}
      publish-max-interval-ms: ${ELVO_AUDIT_PUBLISH_MAX_INTERVAL_MS:2000}
    account-intent:
      event-version: ${ELVO_ACCOUNT_INTENT_EVENT_VERSION:v1}
      exchange: ${ELVO_ACCOUNT_INTENT_EXCHANGE:elvo.identity.account.exchange}
      routing-key: ${ELVO_ACCOUNT_INTENT_ROUTING_KEY:elvo.identity.account.creation.intent}
      dead-letter-exchange: ${ELVO_ACCOUNT_INTENT_DLX:elvo.identity.account.dlx}
      dead-letter-routing-key: ${ELVO_ACCOUNT_INTENT_DLQ_ROUTING_KEY:elvo.identity.account.dead}
      queue: ${ELVO_ACCOUNT_INTENT_QUEUE:elvo.identity.account.queue}
      dead-letter-queue: ${ELVO_ACCOUNT_INTENT_DLQ:elvo.identity.account.dlq}
      retry-queue: ${ELVO_ACCOUNT_INTENT_RETRY_QUEUE:elvo.identity.account.retry.queue}
      retry-routing-key: ${ELVO_ACCOUNT_INTENT_RETRY_ROUTING_KEY:elvo.identity.account.retry}
      retry-delay-ms: ${ELVO_ACCOUNT_INTENT_RETRY_DELAY_MS:5000}
      publish-max-attempts: ${ELVO_ACCOUNT_INTENT_PUBLISH_MAX_ATTEMPTS:3}
      publish-initial-interval-ms: ${ELVO_ACCOUNT_INTENT_PUBLISH_INITIAL_INTERVAL_MS:200}
      publish-multiplier: ${ELVO_ACCOUNT_INTENT_PUBLISH_MULTIPLIER:2.0}
      publish-max-interval-ms: ${ELVO_ACCOUNT_INTENT_PUBLISH_MAX_INTERVAL_MS:2000}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: false

management:
  health:
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
