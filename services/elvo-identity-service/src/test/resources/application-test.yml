spring:
  datasource:
    url: jdbc:h2:mem:identity_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
  security:
    user:
      name: test-user
      password: test-password

elvo:
  startup:
    validate-required-env: false
  security:
    jwt:
      secret: identity-test-jwt-secret-at-least-thirty-two-bytes-long
  messaging:
    audit:
      event-version: v1
      exchange: test.identity.audit.exchange
      routing-key: test.identity.audit.event
      dead-letter-exchange: test.identity.audit.dlx
      dead-letter-routing-key: test.identity.audit.dead
      queue: test.identity.audit.queue
      dead-letter-queue: test.identity.audit.dlq
      retry-queue: test.identity.audit.retry.queue
      retry-routing-key: test.identity.audit.retry
      retry-delay-ms: 100
      publish-max-attempts: 1
      publish-initial-interval-ms: 10
      publish-multiplier: 1.0
      publish-max-interval-ms: 10
