spring:
  datasource:
    url: jdbc:h2:mem:elvo_wallet_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      url: redis://localhost:6379
  rabbitmq:
    addresses: amqp://guest:guest@localhost:5672

logging:
  level:
    root: INFO