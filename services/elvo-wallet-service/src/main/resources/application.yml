spring:
  application:
    name: elvo-wallet-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:classpath:/shared/config-lib.yml,optional:classpath:/shared/messaging-lib.yml,optional:file:./config/application-database.yml,optional:file:./config/application-messaging.yml,optional:file:./config/application-security.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/elvo_wallet}
    username: ${DB_USER:${ELVO_DB_USER:elvo}}
    password: ${DB_PASS:${ELVO_DB_PASSWORD:elvo}}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: ${ELVO_REDIS_TIMEOUT_MS:5000}
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://guest:guest@localhost:5672}

management:
  metrics:
    tags:
      service: ${ELVO_SERVICE_TAG:wallet-service}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: ${ELVO_LOG_LEVEL_ROOT:INFO}
    com.elvo.wallet: ${ELVO_LOG_LEVEL_APP:INFO}
  pattern:
    level: "%5p [corr:%X{correlationId}]"

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}
  release: ${SENTRY_RELEASE:elvo-wallet-service@${spring.application.name}-${SENTRY_ENVIRONMENT:${SPRING_PROFILES_ACTIVE:dev}}}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:1.0}
  send-default-pii: true
  max-breadcrumbs: ${SENTRY_MAX_BREADCRUMBS:100}
  attach-stacktrace: true
  in-app-includes:
    - com.elvo.wallet
  tags:
    service: ${ELVO_SERVICE_TAG:wallet-service}
    domain: wallet
    platform: spring-boot

elvo:
  clients:
    identity:
      base-url: ${ELVO_IDENTITY_INTERNAL_BASE_URL:http://localhost:8081/internal}
      source-service-name: ${ELVO_IDENTITY_CLIENT_SOURCE_SERVICE:wallet-service}
      client-source-ip: ${ELVO_IDENTITY_CLIENT_SOURCE_IP:wallet-service}
      client-source-user-agent: ${ELVO_IDENTITY_CLIENT_SOURCE_USER_AGENT:wallet-service-client}
      token-ttl-seconds: ${ELVO_IDENTITY_CLIENT_TOKEN_TTL_SECONDS:60}
      connect-timeout-seconds: ${ELVO_IDENTITY_CLIENT_CONNECT_TIMEOUT_SECONDS:3}
      read-timeout-seconds: ${ELVO_IDENTITY_CLIENT_READ_TIMEOUT_SECONDS:5}
  monitoring:
    sentry:
      service-tag: ${ELVO_SERVICE_TAG:wallet-service}
  security:
    jwt:
      secret: ${ELVO_JWT_SECRET_REF:sm://wallet-user-jwt-secret}
      issuer: ${ELVO_JWT_ISSUER:elvo-identity-service-${spring.profiles.active:dev}}
      audience: ${ELVO_JWT_AUDIENCE:elvo-wallet-service-${spring.profiles.active:dev}}
      revocation:
        key-prefix: ${ELVO_JWT_REVOCATION_KEY_PREFIX:elvo:jwt:revoked:}
        namespace: ${ELVO_JWT_REVOCATION_NAMESPACE:elvo:${spring.profiles.active:dev}}
      signing:
        key-id: ${ELVO_JWT_SIGNING_KEY_ID:}
        public-key-pem: ${ELVO_JWT_SIGNING_PUBLIC_KEY_REF:sm://wallet-user-jwt-signing-public-key}
        previous-key-id: ${ELVO_JWT_PREVIOUS_SIGNING_KEY_ID:}
        previous-public-key-pem: ${ELVO_JWT_PREVIOUS_SIGNING_PUBLIC_KEY_REF:sm://wallet-user-jwt-signing-previous-public-key}
      access-token-ttl-minutes: ${ELVO_JWT_ACCESS_TTL_MINUTES:15}
      refresh-token-ttl-days: ${ELVO_JWT_REFRESH_TTL_DAYS:7}
    internal-jwt:
      secret: ${ELVO_INTERNAL_JWT_SECRET_REF:sm://wallet-internal-jwt-secret}
      issuer: ${ELVO_INTERNAL_JWT_ISSUER:elvo-wallet-service-internal-${spring.profiles.active:dev}}
      audience: ${ELVO_INTERNAL_JWT_AUDIENCE:elvo-wallet-service-internal-${spring.profiles.active:dev}}
      required-role: ${ELVO_INTERNAL_JWT_REQUIRED_ROLE:INTERNAL_SERVICE}
      source-service-claim: ${ELVO_INTERNAL_JWT_SOURCE_SERVICE_CLAIM:sourceService}
      service-identity-claim: ${ELVO_INTERNAL_JWT_SERVICE_IDENTITY_CLAIM:serviceIdentity}
    internal-authz:
      service-rules:
        identity-service:
          - GET:/api/v1/internal/wallets/*/balance
        billing-service:
          - POST:/api/v1/internal/wallets/*/reserve
          - POST:/api/v1/internal/wallets/*/release
          - POST:/api/v1/internal/wallets/*/confirm-debit
        saga-service:
          - POST:/api/v1/internal/wallets/*/reverse
        agent-service:
          - POST:/api/v1/internal/wallets/*/device-free-withdrawal
    mtls:
      enabled: ${ELVO_MTLS_ENABLED:}
      subject-principal-regex: ${ELVO_MTLS_SUBJECT_REGEX:CN=(.*?)(?:,|$)}
      trusted-common-names:
        - ${ELVO_MTLS_CN_IDENTITY_SERVICE:identity-service}
        - ${ELVO_MTLS_CN_BILLING_SERVICE:billing-service}
        - ${ELVO_MTLS_CN_AGENT_SERVICE:agent-service}
        - ${ELVO_MTLS_CN_SAGA_SERVICE:saga-service}
    correlation:
      signature-secret: ${ELVO_CORRELATION_SIGNATURE_SECRET_REF:sm://wallet-correlation-signature-secret}
    eac:
      replay:
        window-seconds: ${ELVO_EAC_REPLAY_WINDOW_SECONDS:300}
    etc:
      hash-pepper: ${ELVO_ETC_HASH_PEPPER:}
      min-secure-length: ${ELVO_ETC_MIN_SECURE_LENGTH:12}
      max-expiry-window-seconds: ${ELVO_ETC_MAX_EXPIRY_WINDOW_SECONDS:900}
      bruteforce:
        max-attempts-per-code: ${ELVO_ETC_MAX_ATTEMPTS_PER_CODE:5}
        max-attempts-per-device: ${ELVO_ETC_MAX_ATTEMPTS_PER_DEVICE:10}
        max-attempts-per-ip: ${ELVO_ETC_MAX_ATTEMPTS_PER_IP:20}
        window-seconds: ${ELVO_ETC_BRUTEFORCE_WINDOW_SECONDS:900}
    step-up:
      withdrawal-threshold: ${ELVO_STEP_UP_WITHDRAWAL_THRESHOLD:250.00}
      transfer-threshold: ${ELVO_STEP_UP_TRANSFER_THRESHOLD:500.00}
    transaction-challenge:
      secret: ${ELVO_TX_CHALLENGE_SECRET_REF:sm://wallet-transaction-challenge-secret}
      issuer: ${ELVO_TX_CHALLENGE_ISSUER:elvo-wallet-service-transaction-${spring.profiles.active:dev}}
      audience: ${ELVO_TX_CHALLENGE_AUDIENCE:wallet-transaction-challenge-${spring.profiles.active:dev}}
      ttl-seconds: ${ELVO_TX_CHALLENGE_TTL_SECONDS:300}
    transaction-lifecycle:
      expiry-minutes: ${ELVO_TRANSACTION_LIFECYCLE_EXPIRY_MINUTES:30}
    rate-limit:
      window-seconds: ${ELVO_RATE_LIMIT_WINDOW_SECONDS:60}
      per-user-threshold: ${ELVO_RATE_LIMIT_PER_USER_THRESHOLD:30}
      per-ip-threshold: ${ELVO_RATE_LIMIT_PER_IP_THRESHOLD:60}
      per-device-threshold: ${ELVO_RATE_LIMIT_PER_DEVICE_THRESHOLD:40}
      per-ean-threshold: ${ELVO_RATE_LIMIT_PER_EAN_THRESHOLD:20}
    fraud:
      velocity:
        window-seconds: ${ELVO_FRAUD_VELOCITY_WINDOW_SECONDS:120}
        transfer-max-count: ${ELVO_FRAUD_VELOCITY_TRANSFER_MAX_COUNT:5}
        withdrawal-max-count: ${ELVO_FRAUD_VELOCITY_WITHDRAWAL_MAX_COUNT:4}
      rules:
        transfer-verification-threshold: ${ELVO_FRAUD_RULES_TRANSFER_VERIFICATION_THRESHOLD:500.00}
        withdrawal-verification-threshold: ${ELVO_FRAUD_RULES_WITHDRAWAL_VERIFICATION_THRESHOLD:250.00}
    maker-checker:
      enabled: ${ELVO_MAKER_CHECKER_ENABLED:true}
      transfer-threshold: ${ELVO_MAKER_CHECKER_TRANSFER_THRESHOLD:1000.00}
      withdrawal-threshold: ${ELVO_MAKER_CHECKER_WITHDRAWAL_THRESHOLD:750.00}
      approval-ttl-seconds: ${ELVO_MAKER_CHECKER_APPROVAL_TTL_SECONDS:86400}
    audit:
      signature-secret: ${ELVO_AUDIT_SIGNATURE_SECRET_REF:sm://wallet-audit-signature-secret}
    alert-stream:
      enabled: ${ELVO_SECURITY_ALERT_STREAM_ENABLED:true}
      exchange: ${ELVO_SECURITY_ALERT_STREAM_EXCHANGE:elvo.wallet.security.alert.exchange}
      routing-key: ${ELVO_SECURITY_ALERT_STREAM_ROUTING_KEY:elvo.wallet.security.alert}
    ledger:
      hash:
        key-prefix: ${ELVO_LEDGER_HASH_KEY_PREFIX:elvo:wallet:ledger:hash:}
      snapshot:
        cron: ${ELVO_LEDGER_SNAPSHOT_CRON:0 5 0 * * *}
    destination-risk:
      unusual-amount-threshold: ${ELVO_DESTINATION_RISK_UNUSUAL_AMOUNT_THRESHOLD:500.00}
      max-failures-before-block: ${ELVO_DESTINATION_RISK_MAX_FAILURES_BEFORE_BLOCK:3}
      failure-window-seconds: ${ELVO_DESTINATION_RISK_FAILURE_WINDOW_SECONDS:900}
      ip-risk:
        blocked-ips: ${ELVO_IP_RISK_BLOCKED_IPS:}
        rapid-location-change-seconds: ${ELVO_IP_RISK_RAPID_LOCATION_CHANGE_SECONDS:1800}
    device-trust:
      key-prefix: ${ELVO_DEVICE_TRUST_KEY_PREFIX:elvo:wallet:device-trust:}
      risk-threshold: ${ELVO_DEVICE_TRUST_RISK_THRESHOLD:60}
      ttl-days: ${ELVO_DEVICE_TRUST_TTL_DAYS:30}
      max-score: ${ELVO_DEVICE_TRUST_MAX_SCORE:100}
    field-encryption:
      key: ${ELVO_FIELD_ENCRYPTION_KEY:}
